<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduler - Log In</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="navbar">
    <h1>Scheduler</h1>
  </div>

  <div class="auth-wrapper">
    <div class="card">
      <div class="tabs">
        <button id="tab-login" class="active">Sign In</button>
        <button id="tab-signup">Sign Up</button>
      </div>

      <h2 id="form-title">Welcome Back</h2>

      <form id="login-form">
        <label for="login-username">Username or Email</label>
        <input id="login-username" name="username" required />
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required />
        <button type="submit">Sign In</button>
      </form>

      <form id="signup-form" class="hidden">
        <label for="signup-username">Username</label>
        <input id="signup-username" name="username" required />
        <label for="signup-email">Email</label>
        <input id="signup-email" name="email" type="email" required />
        <label for="signup-password">Password</label>
        <input id="signup-password" name="password" type="password" minlength="6" required />
        <button type="submit">Create Account</button>
      </form>

      <div id="error-msg" class="error-msg"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
